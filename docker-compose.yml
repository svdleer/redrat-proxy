version: '3.8'

services:
  web:
    build: .
    env_file: .env
    volumes:
      - ./app:/app
      - ./data/uploads:/app/static/uploads  # For persistent uploads
    ports:
      - "127.0.0.1:5000:5000"  # Only expose to localhost
    extra_hosts:
      - "host.docker.internal:host-gateway"  # For host MySQL access
    environment:
      - MYSQL_HOST=host.docker.internal