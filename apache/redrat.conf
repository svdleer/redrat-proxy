<VirtualHost *:80>
    ServerName redrat.yourdomain.com
    
    ProxyPreserveHost On
    ProxyPass / http://localhost:5000/
    ProxyPassReverse / http://localhost:5000/
    
    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule /(.*) ws://localhost:5000/$1 [P,L]
    
    # Static files
    Alias /static/ /path/to/redrat-dashboard/app/static/
    <Directory "/path/to/redrat-dashboard/app/static">
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/redrat_error.log
    CustomLog ${APACHE_LOG_DIR}/redrat_access.log combined
</VirtualHost>