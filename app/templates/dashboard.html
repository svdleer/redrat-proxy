<!-- Add Remote Modal -->
<div id="add-remote-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white rounded-lg p-6 w-full max-w-md">
    <h3 class="text-xl font-semibold mb-4">Add New Remote</h3>
    <form id="add-remote-form" enctype="multipart/form-data">
      <!-- Image Upload -->
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">Remote Image</label>
        <div class="flex flex-col items-center">
          <div class="relative w-32 h-32 mb-4 rounded-full overflow-hidden border-2 border-gray-300" id="avatar-preview">
            <img id="preview-image" class="w-full h-full object-cover" src="/static/default-remote.png" alt="Preview">
            <div id="crop-overlay" class="hidden absolute inset-0 border-2 border-white rounded-full"></div>
          </div>
          <input type="file" id="image-upload" accept="image/*" class="hidden">
          <button type="button" id="upload-btn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
            Upload Image
          </button>
        </div>
      </div>
      
      <!-- Other form fields -->
      <div class="mb-4">
        <label class="block text-gray-700 mb-1">Remote Name</label>
        <input type="text" name="name" class="w-full px-3 py-2 border rounded" required>
      </div>
      
      <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">
        Add Remote
      </button>
    </form>
  </div>
</div>

<script>
// Image Cropping with Preview
document.getElementById('upload-btn').addEventListener('click', () => {
    document.getElementById('image-upload').click();
});

document.getElementById('image-upload').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const preview = document.getElementById('preview-image');
            preview.src = event.target.result;
            
            // Initialize simple client-side cropping
            preview.onload = () => {
                const container = document.getElementById('avatar-preview');
                const overlay = document.getElementById('crop-overlay');
                
                // Ensure square crop
                const size = Math.min(preview.naturalWidth, preview.naturalHeight);
                const left = (preview.naturalWidth - size) / 2;
                const top = (preview.naturalHeight - size) / 2;
                
                preview.style.objectPosition = `-${left}px -${top}px`;
                overlay.classList.remove('hidden');
            };
        };
        reader.readAsDataURL(file);
    }
});

// Form Submission
document.getElementById('add-remote-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = new FormData();
    formData.append('name', e.target.name.value);
    formData.append('api_key', `remote_${Math.random().toString(36).substring(2, 8)}`);
    
    const imageInput = document.getElementById('image-upload');
    if (imageInput.files[0]) {
        formData.append('image', imageInput.files[0]);
    }
    
    try {
        const response = await fetch('/api/remotes', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        if (result.status === 'success') {
            location.reload(); // Refresh to show new remote
        }
    } catch (error) {
        console.error('Error:', error);
    }
});
</script>
